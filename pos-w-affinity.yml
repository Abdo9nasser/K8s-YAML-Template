apiVersion: v1
kind: Pod
metadata:
  namespace: default
  labels:
    app: my-app
    env: production
spec:
  containers:
    - name: my-container
      image: nginx:latest
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits: 
          cpu: "500m"
          memory: "256Mi"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "env"
                operator: "In"
                values:
                  - test
  