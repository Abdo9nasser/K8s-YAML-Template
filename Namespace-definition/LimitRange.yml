apiVersion: v1
kind: LimitRange
metadata:
  name: my-namespace-limits
  namespace: my-namespace
spec:
  limits:
    - type: Container
      default:                  # applied if container sets no limits
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:           # applied if container sets no requests
        cpu: "100m"
        memory: "128Mi"
      max:                      # hard ceiling per container
        cpu: "2"
        memory: "1Gi"
      min:                      # floor per container
        cpu: "50m"
        memory: "64Mi"