apiVersion: v1
kind: Pod
metadata:
  namespace: default
  labels:
    app: my-app
    env: production
spec:
  containers:
    - name: my-container
      image: nginx:latest
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
  tolerations:
    - key: "env"
      operator: "Equal"
      value: "test"
      effect: "NoSchedule"

------------------------------------------------------------------------------------------------------
------------------------------terminal----------------------------------------------------------------
kubectl taint node <node-name> env=test:NoSchedule